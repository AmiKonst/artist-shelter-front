<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <!-- Цвет адресной строки (изменим с black на коралловый в стиле проекта) -->
    <meta name="theme-color" content="#FF6B6B" />

    <link rel="icon" href="<%= favicon %>" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
    
    <!-- Основные метатеги -->
    <title>Питомник для артистов | Подари звезде второй шанс</title>
    <meta name="description" content="Цифровой приют для музыкантов, которых ИИ выгнал из стримингов. Забирай артистов в свои видео, мемы и Reels!" />
    <meta name="keywords" content="музыка, приют для артистов, мемы, бесплатная музыка для видео, продвижение артистов" />

    <!-- Open Graph (для соцсетей: FB, VK, TG) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://artist-shelter.com" />
    <meta property="og:title" content="Питомник для артистов: Подари звезде второй шанс" />
    <meta property="og:description" content="Мы подбираем артистов, выброшенных алгоритмами на мороз. Приюти трек в своем новом видео!" />
    <meta property="og:image" content="/img/logo.svg" />

    <!-- Twitter / X -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Artist Shelter | Питомник для артистов" />
    <meta property="twitter:description" content="Тут живут самые ласковые треки, которые ищут добрые уши." />
    <meta property="twitter:image" content="/img/logo.svg" />

    <!-- Каноническая ссылка -->
    <link rel="canonical" href="https://artist-shelter.com" />
</head>
  <body id="shelter-app">
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
